<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R2 Doll Compare</title>
  <script>
    (() => {
      try {
        const raw = sessionStorage.getItem("r2-nav-transition-v1");
        if (!raw) {
          return;
        }
        const data = JSON.parse(raw);
        if (data?.phase === "enter" && (data.direction === "forward" || data.direction === "back")) {
          document.documentElement.dataset.navTransition = `enter-${data.direction}`;
        }
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="compare">
  <header class="app-header">
    <section class="panel panel-topbar" aria-label="Панель сравнения сборок">
      <div class="compare-topbar">
        <button
          id="mobile-nav-toggle"
          class="mobile-nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="mobile-nav-drawer"
          aria-label="Мобильная навигация"
        >
          <span class="mobile-nav-toggle-icon" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </span>
          <span class="mobile-nav-toggle-text">Меню</span>
        </button>

        <div class="compare-topbar-fields">
          <label class="compare-topbar-field">
            <span class="summary-label">Сборка 1</span>
            <select id="compare-primary-select" class="class-control" aria-label="Основная сборка"></select>
          </label>

          <label class="compare-topbar-field">
            <span class="summary-label">Сборка 2</span>
            <select id="compare-secondary-select" class="class-control" aria-label="Вторая сборка"></select>
          </label>
        </div>

        <div class="compare-topbar-actions">
          <a href="index.html" class="ghost-button profile-link-button" data-nav-direction="back">Главное меню</a>
          <div id="compare-language-switch" class="language-switch" aria-label="Переключатель языка">
            <button id="compare-language-cycle-button" class="language-button" type="button" data-language="en">EN</button>
          </div>
        </div>
      </div>
    </section>
  </header>

  <div id="mobile-nav-backdrop" class="mobile-nav-backdrop" hidden></div>
  <aside id="mobile-nav-drawer" class="mobile-nav-drawer" aria-hidden="true"></aside>

  <main class="compare-page-shell">
    <section class="panel compare-profile-panel" aria-label="Сборка 1">
      <div id="compare-primary-editor"></div>
    </section>

    <section class="panel compare-profile-panel" aria-label="Сборка 2">
      <div id="compare-secondary-editor"></div>
    </section>

    <section class="panel compare-summary-panel" aria-label="Итоги сравнения">
      <div id="compare-summary"></div>
    </section>
  </main>

  <script type="module" src="/src/compare-entry.ts"></script>
</body>
</html>
