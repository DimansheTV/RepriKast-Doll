<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R2 Doll</title>
  <script>
    (() => {
      try {
        const raw = sessionStorage.getItem("r2-nav-transition-v1");
        if (!raw) {
          return;
        }
        const data = JSON.parse(raw);
        if (data?.phase === "enter" && (data.direction === "forward" || data.direction === "back")) {
          document.documentElement.dataset.navTransition = `enter-${data.direction}`;
        }
      } catch {}
    })();
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="main">
  <header class="app-header">
    <section class="panel panel-topbar" aria-label="Панель профиля">
      <div class="profile-toolbar">
        <div class="profile-field">
          <select id="profile-select" class="class-control" aria-label="Выбор профиля"></select>
        </div>

        <div class="profile-field profile-field-name">
          <input id="profile-name-input" class="class-control" type="text" maxlength="40" placeholder="Название профиля" aria-label="Название профиля">
        </div>

        <div class="profile-actions">
          <button id="profile-save-button" class="ghost-button" type="button">Сохранить</button>
          <button id="profile-copy-button" class="ghost-button" type="button">Скопировать</button>
          <button id="profile-new-button" class="ghost-button" type="button">Новый профиль</button>
          <button id="profile-delete-button" class="ghost-button" type="button">Удалить профиль</button>
          <a href="compare.html" class="ghost-button profile-link-button" data-nav-direction="forward">Сравнение</a>
        </div>
      </div>
    </section>
  </header>

  <div class="app-shell">
    <aside class="panel panel-sidebar">
      <div class="sidebar-tabs" role="tablist" aria-label="Левая панель">
        <button class="sidebar-tab-button is-active" type="button" data-tab="class">Класс</button>
        <button class="sidebar-tab-button" type="button" data-tab="stats">Параметры экипировки</button>
      </div>

      <div class="sidebar-panels">
        <section class="sidebar-panel is-active" data-tab-panel="class">
          <div class="section-title-row">
            <h2>Класс</h2>
            <span class="section-note">Базовые данные</span>
          </div>

          <section class="class-controls">
            <label class="class-field">
              <span class="summary-label">Класс</span>
              <select id="class-select" class="class-control">
                <option value="knight">Рыцарь</option>
                <option value="ranger">Рейнджер</option>
                <option value="mage">Маг</option>
                <option value="summoner">Призыватель</option>
                <option value="assassin">Ассасин</option>
              </select>
            </label>

            <label class="class-field">
              <span class="summary-label">Уровень</span>
              <input id="class-level-input" class="class-control" type="number" min="1" max="200" step="1" value="1">
            </label>
          </section>

          <section class="stats-section">
            <div class="stats-subtitle-row">
              <h3>Параметры от уровня</h3>
            </div>
            <div id="class-base-stats" class="stat-list"></div>
          </section>

          <section class="stats-section">
            <div class="stats-subtitle-row">
              <h3>Характеристики от уровня</h3>
            </div>
            <div id="class-derived-stats" class="stat-list stat-list-secondary"></div>
          </section>
        </section>

        <section class="sidebar-panel" data-tab-panel="stats">
          <div class="section-title-row">
            <h2>Параметры экипировки</h2>
            <span class="section-note">Переключение по источникам</span>
          </div>

          <nav class="stats-source-tabs" aria-label="Источники параметров">
            <button class="stats-source-tab is-active" type="button" data-stats-tab="inventory">Инвентарь</button>
            <button class="stats-source-tab" type="button" data-stats-tab="pets">Питомцы</button>
            <button class="stats-source-tab" type="button" data-stats-tab="spheres">Сферы</button>
            <button class="stats-source-tab" type="button" data-stats-tab="trophies">Трофеи</button>
            <button class="stats-source-tab" type="button" data-stats-tab="sets">Сеты</button>
            <button class="stats-source-tab" type="button" data-stats-tab="effects">Эффекты</button>
          </nav>

          <section class="stats-source-panel is-active" data-stats-panel="inventory">
            <section class="stats-section">
              <div class="stats-subtitle-row">
                <h3>Параметры инвентаря</h3>
              </div>
              <div id="stats-inventory-list" class="stat-list"></div>
            </section>
          </section>

          <section class="stats-source-panel" data-stats-panel="pets">
            <section class="stats-section">
              <div class="stats-subtitle-row">
                <h3>Параметры питомца</h3>
              </div>
              <div id="stats-pets-list" class="stat-list stat-list-secondary"></div>
            </section>
          </section>

          <section class="stats-source-panel" data-stats-panel="spheres">
            <section class="stats-section">
              <div class="stats-subtitle-row">
                <h3>Параметры сфер</h3>
              </div>
              <div id="stats-spheres-list" class="stat-list stat-list-secondary"></div>
            </section>
          </section>

          <section class="stats-source-panel" data-stats-panel="trophies">
            <section class="stats-section">
              <div class="stats-subtitle-row">
                <h3>Параметры трофеев</h3>
              </div>
              <div id="stats-trophies-list" class="stat-list stat-list-secondary"></div>
            </section>
          </section>

          <section class="stats-source-panel" data-stats-panel="sets">
            <section class="stats-section">
              <div class="stats-subtitle-row">
                <h3>Параметры от сета</h3>
              </div>
              <div id="stats-set-list" class="stat-list stat-list-secondary"></div>
            </section>
          </section>

          <section class="stats-source-panel" data-stats-panel="effects">
            <section class="stats-section">
              <div class="stats-subtitle-row">
                <h3>Особые эффекты</h3>
              </div>
              <div id="stats-effects-list" class="effects-list"></div>
            </section>
          </section>
        </section>

      </div>
    </aside>

    <section class="panel panel-board" aria-label="Итоговые параметры">
      <section class="stats-frame">
        <section class="board-stats-panel">
          <div class="board-stats-columns">
            <div id="board-main-stats" class="board-stats-list board-stats-list-main"></div>
            <div id="board-extra-stats" class="board-stats-list board-stats-list-extra"></div>
          </div>
        </section>
      </section>
    </section>

    <main class="panel panel-workspace">
      <section class="workspace-column" aria-label="Рабочая область куклы">
        <nav class="workspace-tabs" aria-label="Рабочие области">
          <button class="workspace-tab is-active" type="button" data-workspace-tab="inventory">Инвентарь</button>
          <button class="workspace-tab" type="button" data-workspace-tab="pet">Питомцы</button>
          <button class="workspace-tab" type="button" data-workspace-tab="spheres">Сферы</button>
          <button class="workspace-tab" type="button" data-workspace-tab="trophies">Трофеи</button>
        </nav>

        <section class="workspace-panel is-active" data-workspace-panel="inventory">
          <section class="equipment-column">
            <section class="equipment-stage" aria-label="Слоты экипировки">
              <div id="slot-grid" class="slot-grid" aria-live="polite"></div>
            </section>

            <section class="passive-slot-panel" aria-label="Пассивное кольцо перевоплощения">
              <div id="passive-ring-slot" class="passive-slot-grid" aria-live="polite"></div>
            </section>
          </section>
        </section>

        <section class="workspace-panel" data-workspace-panel="spheres">
          <section class="sphere-column">
            <section class="sphere-stage" aria-label="Слоты сфер">
              <div id="sphere-slot-grid" class="sphere-slot-grid" aria-live="polite"></div>
            </section>
          </section>
        </section>

        <section class="workspace-panel" data-workspace-panel="pet">
          <section class="pet-column">
            <section class="pet-stage" aria-label="Выбранный питомец">
              <div id="pet-stage" class="pet-stage-grid" aria-live="polite"></div>
            </section>
          </section>
        </section>

        <section class="workspace-panel" data-workspace-panel="trophies">
          <section class="trophy-column">
            <section class="trophy-stage" aria-label="Слоты трофеев">
              <div id="trophy-slot-grid" class="trophy-slot-grid" aria-live="polite"></div>
            </section>
          </section>
        </section>
      </section>
    </main>

    <aside class="panel panel-right">
      <div class="section-title-row">
        <h2>Каталог</h2>
        <div class="catalog-context" aria-label="Контекст каталога">
          <span class="catalog-context-item is-active" data-catalog-context="inventory">Экипировка</span>
          <span class="catalog-context-item" data-catalog-context="pet">Питомцы</span>
          <span class="catalog-context-item" data-catalog-context="spheres">Сферы</span>
          <span class="catalog-context-item" data-catalog-context="trophies">Трофеи</span>
        </div>
      </div>

      <div id="category-list" class="category-list"></div>
    </aside>
  </div>

  <script src="app.js"></script>
</body>
</html>
